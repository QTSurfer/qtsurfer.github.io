openapi: 3.1.0
info:
  title: QTSurfer API
  summary: QTSurfer backend services API
  version: 0.93.0
  contact:
    name: QTSurfer Support
    email: support@qtsurfer.com
    url: 'https://qtsurfer.com/support'
  termsOfService: 'https://qtsurfer.com/terms'
  license:
    name: Apache-2.0
    url: 'http://www.apache.org/licenses/LICENSE-2.0.html'
servers:
  - url: 'https://api.staging.qtsurfer.com/v1'
    description: Staging server
  - url: 'https://api.qtsurfer.com/v1'
    description: Production server
paths:
  '/exchanges':
    get:
      operationId: getExchanges
      summary: Get a list of available exchanges
      responses:
        '200':
          description: A JSON array of Exchanges
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Exchange'
              example:
                - id: binance
                  name: Binance
                  description: Binance cryptocurrency exchange
      tags:
        - Exchange
  '/exchange/{exchangeId}/instruments':
    get:
      operationId: getInstruments
      summary: Get a list of Instruments from a specific exchange
      parameters:
        - name: exchangeId
          in: path
          description: ID of the exchange to retrieve instruments for
          required: true
          schema:
            type: string
            example: binance
      responses:
        '200':
          description: A JSON array of Instrument details with data availability
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InstrumentDetail'
              example:
                - id: BTC/USDT
                  base: BTC
                  quote: USDT
                  dataFrom: "2026-03-17T00:00:00Z"
                  dataTo: "2026-03-31T18:00:00Z"
                  lastPrice: 84250.50
                  volume24h: 1234567.89
                - id: ETH/USDT
                  base: ETH
                  quote: USDT
                  dataFrom: "2026-03-17T00:00:00Z"
                  dataTo: "2026-03-31T18:00:00Z"
                  lastPrice: 3120.75
                  volume24h: 456789.12
        '404':
          description: Exchange not found or instrument catalog not available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
      tags:
        - Exchange
  '/exchange/{exchangeId}/tickers/{base}/{quote}':
    get:
      operationId: getExchangeTickersHour
      summary: Download one hour of tickers for an instrument as a Lastra segment
      description: |
        Serves exactly one hour of raw ticker data for the given instrument on the
        requested exchange. The payload is a native [Lastra](https://github.com/QTSurfer/lastra-java)
        file — QTSurfer's columnar format for timeseries at tick precision —
        streamed zero-copy from cold storage, no JSON envelope, no conversion.

        One segment = one hour, aligned to UTC. The `hour` query parameter selects
        the segment and must match `YYYY-MM-DDTHH` (no minutes/seconds, no timezone
        suffix). Example: `hour=2026-01-15T10` returns `h10.lastra` for
        2026-01-15, covering `[10:00:00Z, 11:00:00Z)`.

        Files are sourced from the cold Lastra tree produced by the hourly backfill
        cronjob. There is no hot-cache fallback in this MVP: hours that haven't
        been backfilled yet return `404`.

        A `format=parquet` query parameter switches the response to an
        on-the-fly Lastra→Parquet conversion (via
        [lastra-convert](https://github.com/QTSurfer/lastra-convert) running on
        the Vert.x worker pool). Lastra remains the primary serving format;
        Parquet is a compatibility path for internal consumers that don't yet
        read Lastra (e.g. Strategy Studio). Conversion is CPU-bound and
        not cached, so Lastra is cheaper when the client can consume it.

        Clients:
        - [lastra-java](https://github.com/QTSurfer/lastra-java) — reference
          Java reader/writer with per-column codecs (ALP, Gorilla, delta-varint,
          ZSTD) and CRC32 integrity.
        - [lastra-ts](https://github.com/QTSurfer/lastra-ts) — TypeScript reader
          (~4 kB bundle, browser + Node.js).
        - [duckdb-lastra](https://github.com/QTSurfer/duckdb-lastra) — DuckDB
          extension for ad-hoc SQL over Lastra files.
        - [lastra-convert](https://github.com/QTSurfer/lastra-convert) — CLI + Java
          API for converting to/from Parquet, Reef, and CSV.
        - `curl -OJ` for offline dumps (the `Content-Disposition` header sets a
          descriptive filename).
      parameters:
        - name: exchangeId
          in: path
          required: true
          description: ID of the exchange (e.g. `binance`).
          schema:
            type: string
            example: binance
        - name: base
          in: path
          required: true
          description: Base asset symbol (first leg of the pair).
          schema:
            type: string
            example: BTC
        - name: quote
          in: path
          required: true
          description: Quote asset symbol (second leg of the pair).
          schema:
            type: string
            example: USDT
        - name: hour
          in: query
          required: true
          description: |
            Hour selector in `YYYY-MM-DDTHH` (UTC). The returned segment covers
            `[HH:00:00Z, HH+1:00:00Z)`.
          schema:
            type: string
            pattern: '^\d{4}-\d{2}-\d{2}T\d{2}$'
            example: '2026-01-15T10'
        - name: format
          in: query
          required: false
          description: |
            Response wire format. `lastra` (default) streams the raw Lastra
            bytes zero-copy. `parquet` runs a live Lastra→Parquet conversion
            on the server (via
            [lastra-convert](https://github.com/QTSurfer/lastra-convert)).
          schema:
            type: string
            enum: [lastra, parquet]
            default: lastra
            example: lastra
      responses:
        '200':
          description: |
            One hour of tickers for the instrument. `Content-Type` is
            `application/vnd.lastra` by default or
            `application/vnd.apache.parquet` when `format=parquet` was
            requested.
          headers:
            Content-Disposition:
              description: |
                Attachment filename `{BASE}_{QUOTE}_{YYYY-MM-DD}_h{HH}.{ext}`
                where `{ext}` is `lastra` or `parquet` to match the format.
              schema:
                type: string
          content:
            application/vnd.lastra:
              schema:
                type: string
                format: binary
            application/vnd.apache.parquet:
              schema:
                type: string
                format: binary
        '400':
          description: Missing or malformed parameters (e.g. `hour` not `YYYY-MM-DDTHH`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '404':
          description: No Lastra segment exists for the requested instrument/hour.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '500':
          description: Unexpected I/O error serving the file.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
      tags:
        - Exchange
  '/exchange/{exchangeId}/klines/{base}/{quote}':
    get:
      operationId: getExchangeKlinesHour
      summary: Download one hour of klines for an instrument as a Lastra segment
      description: |
        Same shape and semantics as `/exchange/{exchangeId}/tickers/{base}/{quote}`,
        but serves klines (1-minute bars) instead of raw ticks. One
        [Lastra](https://github.com/QTSurfer/lastra-java) segment = one hour of
        1m klines for the instrument, aligned to UTC.

        The klines payload is the Vision-backfill / WebSocket-recorded stream in
        the same columnar layout as tickers — readers that handle one format read
        the other with the same code. Use this endpoint when a per-tick payload
        would be too large for the window of interest.
      parameters:
        - name: exchangeId
          in: path
          required: true
          description: ID of the exchange (e.g. `binance`).
          schema:
            type: string
            example: binance
        - name: base
          in: path
          required: true
          description: Base asset symbol.
          schema:
            type: string
            example: BTC
        - name: quote
          in: path
          required: true
          description: Quote asset symbol.
          schema:
            type: string
            example: USDT
        - name: hour
          in: query
          required: true
          description: |
            Hour selector in `YYYY-MM-DDTHH` (UTC). The returned segment covers
            `[HH:00:00Z, HH+1:00:00Z)` and contains up to 60 one-minute bars.
          schema:
            type: string
            pattern: '^\d{4}-\d{2}-\d{2}T\d{2}$'
            example: '2026-01-15T10'
        - name: format
          in: query
          required: false
          description: |
            Response wire format. `lastra` (default) streams the raw Lastra
            bytes zero-copy. `parquet` runs a live Lastra→Parquet conversion
            on the server.
          schema:
            type: string
            enum: [lastra, parquet]
            default: lastra
            example: lastra
      responses:
        '200':
          description: |
            One hour of klines for the instrument. `Content-Type` is
            `application/vnd.lastra` by default or
            `application/vnd.apache.parquet` when `format=parquet`.
          headers:
            Content-Disposition:
              description: |
                Attachment filename
                `{BASE}_{QUOTE}_{YYYY-MM-DD}_h{HH}_klines.{ext}`
                where `{ext}` is `lastra` or `parquet` to match the format.
              schema:
                type: string
          content:
            application/vnd.lastra:
              schema:
                type: string
                format: binary
            application/vnd.apache.parquet:
              schema:
                type: string
                format: binary
        '400':
          description: Missing or malformed parameters (e.g. `hour` not `YYYY-MM-DDTHH`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '404':
          description: No Lastra segment exists for the requested instrument/hour.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '500':
          description: Unexpected I/O error serving the file.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
      tags:
        - Exchange
  '/strategy':
    post:
      operationId: postStrategy
      summary: Compile a strategy from source code
      description: |
        Submits raw strategy source for compilation. By default the call is synchronous and returns
        the `strategyId` once compilation succeeds. Set the header `X-Compile-Async: true` to enqueue
        the compile task and return immediately with a `jobId` — poll
        `GET /strategy/{strategyId}` to check status.

        The `strategyId` is deterministic: the same source for the same user always produces the
        same id.
      parameters:
        - name: X-Compile-Async
          in: header
          required: false
          description: When `true`, compile asynchronously and return `202` with a `jobId`.
          schema:
            type: boolean
            default: false
      requestBody:
        description: The raw strategy source code
        required: true
        content:
          text/plain:
            schema:
              type: string
              description: Raw strategy Java source code
      responses:
        '200':
          description: Strategy compiled successfully (sync mode)
          content:
            application/json:
              schema:
                type: object
                required: [strategyId]
                properties:
                  strategyId:
                    $ref: '#/components/schemas/strategyId'
              example:
                strategyId: 6bsh31ikwkuivhtgcoa6s4
        '202':
          description: "Compile task accepted (async mode — set `X-Compile-Async: true`)"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedJob'
        '400':
          description: Invalid strategy (compilation error)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                code: 400
                message: 'Line 1, Column 18: syntax error'
      security:
        - bearerAuth: []
      tags:
        - Strategy
  '/strategy/{strategyId}':
    get:
      operationId: getStrategyStatus
      summary: Get the status of an async compile task
      description: |
        Polls the status of a strategy compilation. Useful when the strategy was submitted with
        `X-Compile-Async: true`. Returns the resolved `strategyId` once compilation completes.
      parameters:
        - name: strategyId
          in: path
          required: true
          description: The id returned by `POST /strategy` (sync) or the `jobId` returned in async mode
          schema:
            type: string
            example: 6bsh31ikwkuivhtgcoa6s4
      responses:
        '200':
          description: Strategy compile state
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  jobId:
                    type: string
                    description: Compile job id (only set in async mode)
                    example: 6bsh31ikwkuivhtgcoa6s4
                  status:
                    type: string
                    enum: [New, Started, Completed, Aborted, Failed]
                    example: Completed
                  strategyId:
                    $ref: '#/components/schemas/strategyId'
                  statusDetail:
                    type: ['string', 'null']
                    description: Compilation error messages when `status` is `Failed`
        '404':
          description: Strategy compile job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
      security:
        - bearerAuth: []
      tags:
        - Strategy

  '/backtest/{exchangeId}/{type}/prepare':
    post:
      operationId: prepareBacktesting
      summary: Prepare backtesting data
      description: |
        Enqueues a prepare task over the requested date range. Returns immediately with a `jobId`;
        poll `GET /backtest/{exchangeId}/{type}/prepare/{jobId}` for completion.

        The same params always return the same `jobId` (idempotent). Repeated calls with identical
        params do not enqueue duplicate work — they reuse the existing job.
      parameters:
        - name: exchangeId
          in: path
          description: ID of the exchange to prepare the backtesting for
          required: true
          schema:
            type: string
            example: binance
        - name: type
          in: path
          description: The type of data source to prepare from
          required: true
          schema:
            $ref: '#/components/schemas/DataSourceType'
      requestBody:
        description: The required data to prepare a backtesting
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [instrument, from, to]
              properties:
                instrument:
                  $ref: '#/components/schemas/Instrument'
                from:
                  type: string
                  description: |
                    Start date for the preparation process. Supports the following formats:
                    - ISO-8601 (e.g. 2024-12-14T23:59:59Z)
                    - ISO DATE (e.g. 2024-12-14)
                    - BASIC ISO DATE (e.g., 20241214)
                  example: "2024-12-13T00:00:00Z"
                to:
                  type: string
                  description: |
                    End date for the preparation process. Supports the following formats:
                    - ISO-8601 (e.g. 2024-12-14T23:59:59Z)
                    - ISO DATE (e.g. 2024-12-14)
                    - BASIC ISO DATE (e.g., 20241214)
                  example: "2024-12-14"
                cadence:
                  type: string
                  description: |
                    Output bar cadence for the prepared range. Defaults to the publisher's
                    native cadence (`1s`); coarser cadences are produced on demand via
                    resampling and stored alongside the native blob in cache. Coarser-than-
                    source values must be exact multiples of the source cadence — invalid
                    labels return `400`.
                  enum: [1s, 5s, 1m, 5m, 15m, 1h, 4h, 1d]
                  default: "1s"
            example:
              instrument: BTC/USDT
              from: "2024-12-13T00:00:00Z"
              to: "2024-12-14T00:00:00Z"
              cadence: "1m"
      responses:
        '202':
          description: Prepare task accepted (queued for processing)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedJob'
        '400':
          description: |
            Invalid request or parameters. Also returned when `from` is older than the configured
            lookback window or `to` is in the future.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '404':
          description: Exchange or data source type not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '429':
          description: |
            Rate limited. Returned when the global queue exceeds capacity or the user has too many
            active backtests.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
              example:
                code: 429
                message: "Too many active backtests. Wait for some to complete."
      security:
        - bearerAuth: []
      tags:
        - Backtesting
  '/backtest/{exchangeId}/{type}/prepare/{jobId}':
    get:
      operationId: getPreparationStatus
      summary: Get the status of a prepare job
      description: |
        Retrieves the current state of the prepare job identified by `jobId`.
        Poll until `status` is `Completed`, `Failed`, or `Aborted`.
      parameters:
        - name: exchangeId
          in: path
          description: ID of the exchange for the backtesting process
          required: true
          schema:
            type: string
            example: binance
        - name: type
          in: path
          description: The type of data source to prepare from
          required: true
          schema:
            $ref: '#/components/schemas/DataSourceType'
        - name: jobId
          in: path
          description: Job ID returned by `POST /prepare`
          required: true
          schema:
            type: string
            example: 13RBLGQlPnfDjO6wyKSX8i
      responses:
        '200':
          description: Current prepare job state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobState'
              example:
                contextId: "jctx:ticker:4a627755-7f5a-4297-b647-8dddd8aee416:binance:1rabbrpk5r4kkegs83w6qr:btc/usdt:0bjmoxd4vahkgc0hnvdldh"
                status: "Completed"
                statusDetail: null
                size: 0
                completed: 24
                startTime: "2026-04-14T15:00:00Z"
                endTime: "2026-04-14T15:00:01Z"
        '404':
          description: Prepare job not found or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '400':
          description: Invalid request or parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
      security:
        - bearerAuth: []
      tags:
        - Backtesting
  '/backtest/{exchangeId}/{type}/execute':
    post:
      operationId: executeBacktesting
      summary: Execute a compiled strategy against a prepared dataset
      description: |
        Enqueues an execute task that runs the strategy identified by `strategyId` over the data
        prepared by the prepare job identified by `prepareJobId`. The instrument and date range are
        recovered from the prepare job — they do not need to be sent again.

        Returns immediately with a `jobId`; poll `GET /backtest/{exchangeId}/{type}/execute/{jobId}`
        for the result.

        The same params (same `prepareJobId`, `strategyId`, `storeSignals`) always return the same
        `jobId` (idempotent).
      parameters:
        - name: exchangeId
          in: path
          description: ID of the exchange for the backtesting process
          required: true
          schema:
            type: string
            example: binance
        - name: type
          in: path
          description: The type of data source to execute from
          required: true
          schema:
            $ref: '#/components/schemas/DataSourceType'
      requestBody:
        description: Execute task parameters
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [prepareJobId, strategyId]
              properties:
                prepareJobId:
                  type: string
                  description: Job ID returned by `POST /prepare` (must be in `Completed` state)
                  example: 13RBLGQlPnfDjO6wyKSX8i
                strategyId:
                  $ref: '#/components/schemas/strategyId'
                storeSignals:
                  type: boolean
                  description: |
                    When true, the worker uploads emitted signals to object storage and the
                    response includes `signalsUrl` / `signalsId` fields. Defaults to false.
                  default: false
            example:
              prepareJobId: "13RBLGQlPnfDjO6wyKSX8i"
              strategyId: "6bsh31ikwkuivhtgcoa6s4"
              storeSignals: false
      responses:
        '202':
          description: Execute task accepted (queued for processing)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedJob'
        '404':
          description: Prepare job not found or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '400':
          description: Invalid request or parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '429':
          description: Rate limited (global queue at capacity or per-user limit reached)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
      security:
        - bearerAuth: []
      tags:
        - Backtesting
  '/backtest/{exchangeId}/{type}/execute/{jobId}':
    delete:
      operationId: cancelExecution
      summary: Cancel a running backtest execution
      description: |
        Requests cancellation of the specified execution. The execution
        status will transition to `Aborted` once the cancellation is
        processed. Cancellation is asynchronous — poll the GET endpoint
        to confirm the final status.
      parameters:
        - name: exchangeId
          in: path
          required: true
          schema:
            type: string
            example: binance
        - name: type
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/DataSourceType'
        - name: jobId
          in: path
          description: Job ID returned by `POST /execute`
          required: true
          schema:
            type: string
            example: 13RBLGQlPnfDjO6wyKSX8i
      responses:
        '200':
          description: Cancellation request accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [cancelling]
                    example: cancelling
                  jobId:
                    type: string
                    example: 13RBLGQlPnfDjO6wyKSX8i
        '404':
          description: Execution not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
      security:
        - bearerAuth: []
      tags:
        - Backtesting
    get:
      operationId: getExecutionResult
      summary: Get the result of a backtest execution job
      description: |
        Retrieves the current state and results of the execute job identified by `jobId`.
        Poll until `state.status` is `Completed`, `Failed`, or `Aborted`.
      parameters:
        - name: exchangeId
          in: path
          description: ID of the exchange for the backtesting process
          required: true
          schema:
            type: string
            example: binance
        - name: type
          in: path
          description: The type of data source to execute from
          required: true
          schema:
            $ref: '#/components/schemas/DataSourceType'
        - name: jobId
          in: path
          description: Job ID returned by `POST /execute`
          required: true
          schema:
            type: string
            example: 13RBLGQlPnfDjO6wyKSX8i
      responses:
        '200':
          description: Backtesting execution result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BacktestJobResult'
              example:
                state:
                  contextId: "jctx:ticker:4a627755-7f5a-4297-b647-8dddd8aee416:binance:3vsndwikcuaatjmb83fjtl:btc/usdt:2mnyblatqqw34kix2echpb"
                  status: "Completed"
                  statusDetail: null
                  size: 0
                  completed: 73158
                  startTime: "2026-03-18T13:21:28.958Z"
                  endTime: "2026-03-18T13:21:29.605Z"
                results:
                  hostName: "backtesting-job-worker-v2-688fc5c6fc-5khwk"
                  iops: 123956.53
                  strategyId: "strategy:4a627755-7f5a-4297-b647-8dddd8aee416:ticker:2iyvtenlzh9dabqtxn7nbv"
                  instrument: "BTC/USDT"
                  pnlTotal: 42.75
                  totalTrades: 156
                  winRate: 58.33
                  sharpeRatio: 1.245
                  sortinoRatio: 1.872
                  cagr: 0.1534
                  maxDrawdown: 12.50
                  maxDrawdownPercent: 8.75
                  signalCount: 100000
                  signalsId: "4a627755-7f5a-4297-b647-8dddd8aee416/exec/binance/3vsndwikcuaatjmb83fjtl"
                  signalsUrl: "https://storage.qtsurfer.com/4a627755-7f5a-4297-b647-8dddd8aee416/exec/binance/3vsndwikcuaatjmb83fjtl.parquet"
                  signalsUpload: "Done"
                  signalsUploadedAt: "2026-03-18T13:21:48.170Z"
        '404':
          description: Execution job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '400':
          description: Invalid request or parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
      security:
        - bearerAuth: []
      tags:
        - Backtesting
components:
  schemas:
    ResponseError:
      description: General response error
      type: object
      required:
        - code
        - message
      properties:
        code:
          description: Status code
          type: integer
          example: 400
        message:
          description: Error description
          type: string
          example: Invalid request
    Instrument:
      description: Exchange instrument identifier (e.g. a currency pair)
      type: string
      example: BTC/USDT
    InstrumentDetail:
      description: Exchange instrument with data availability and market info
      type: object
      required:
        - id
        - base
        - quote
      properties:
        id:
          type: string
          description: Instrument identifier (e.g. currency pair)
          example: BTC/USDT
        base:
          type: string
          description: Base currency
          example: BTC
        quote:
          type: string
          description: Quote currency
          example: USDT
        dataFrom:
          type: string
          format: date-time
          description: Earliest timestamp with quality-verified data available for backtesting
          example: "2026-03-17T00:00:00Z"
        dataTo:
          type: string
          format: date-time
          description: Latest timestamp with quality-verified data available for backtesting
          example: "2026-03-31T18:00:00Z"
        lastPrice:
          type: number
          format: double
          description: Last traded price
          example: 84250.50
        volume24h:
          type: number
          format: double
          description: Trading volume in the last 24 hours (in quote currency)
          example: 1234567.89
    Exchange:
      description: Exchange service provider
      type: object
      required:
        - id
        - name
      properties:
        id:
          description: Unique identifier for the exchange
          type: string
          example: binance
        name:
          description: Name of the exchange
          type: string
          example: Binance
        description:
          description: Description of the exchange
          type: string
          example: Binance cryptocurrency exchange
    DataSourceType:
      type: string
      description: Managed exchange data sources available for backtesting. Currently only ticker is supported; kline and funding rate support is planned.
      enum:
        - ticker
      example: ticker
    JobState:
      type: object
      description: Information about a single job
      required:
        - contextId
        - status
        - size
        - completed
      properties:
          contextId:
            type: string
            description: Unique context ID for the job
            example: "jctx:ticker:4a627755-7f5a-4297-b647-8dddd8aee416:binance:1rabbrpk5r4kkegs83w6qr:btc/usdt:2o8heaioicr0edvx5ybcap"
          status:
            type: string
            description: |
              Current status of the job. `Partial` is a prepare-only state: the
              worker finished the synchronous portion (range validated, plan
              persisted, cold-fallback dispatched) but some hours are still being
              produced asynchronously. The GET handler re-evaluates the plan on
              each poll and promotes to `Completed` once everything has landed.
              Treat `Completed | Aborted | Failed` as terminal; anything else
              including `Partial` means keep polling.
            enum:
              - New
              - Started
              - Partial
              - Completed
              - Aborted
              - Failed
            example: "Completed"
          statusDetail:
            type: ['string', 'null']
            description: Detailed status information, if available
            example: "Job completed with error code 5001"
          size:
            type: integer
            description: Total size of the data being prepared
            example: 100
          completed:
            type: integer
            description: The amount of data processed so far
            example: 50
          startTime:
            type: ['string', 'null']
            format: date-time
            description: Timestamp for when the preparation started
            example: "2025-01-04T14:00:00Z"
          endTime:
            type: ['string', 'null']
            format: date-time
            description: Timestamp for when the preparation finished
            example: "2025-01-04T14:00:20Z"
    AcceptedJob:
      type: object
      description: |
        Response returned by async endpoints (`202 Accepted`). The `jobId` is deterministic for the
        same input parameters — repeated calls with identical params return the same id.
      required:
        - jobId
      properties:
        jobId:
          type: string
          description: Unique job identifier; use this to poll for completion.
          example: 13RBLGQlPnfDjO6wyKSX8i
      example:
        jobId: "13RBLGQlPnfDjO6wyKSX8i"
    BacktestJobResult:
      type: object
      description: Backtest job result.
      required:
        - results
        - state
      properties:
        results:
          $ref: '#/components/schemas/ResultMap'
        state:
          $ref: '#/components/schemas/JobState'
    ResultMap:
      type: object
      description: >-
        Execution result map. Always includes core fields (hostName, iops, strategyId, instrument).
        Yield metrics (pnlTotal, totalTrades, winRate, etc.) are present when the strategy emitted at least one trade.
        When signal storage is enabled, includes signal fields described below.
      required:
        - strategyId
        - instrument
      properties:
        hostName:
          type: string
          description: Hostname of the worker node that executed the strategy
          example: "backtesting-job-worker-84b569dff9-dr4lb"
        iops:
          type: number
          format: double
          description: Instrument operations per second throughput during execution
          example: 123956.53
        strategyId:
          type: string
          description: >-
            Redis key of the compiled strategy used for execution.
            Format: strategy:{userId}:ticker:{compilationId}
          example: "strategy:4a627755-7f5a-4297-b647-8dddd8aee416:ticker:2iyvtenlzh9dabqtxn7nbv"
        instrument:
          type: string
          description: The instrument (currency pair) that was backtested
          example: "BTC/USDT"
        pnlTotal:
          type: number
          format: double
          description: Total profit and loss in the output currency
          example: 42.75
        totalTrades:
          type: integer
          format: int64
          description: Total number of trades executed by the strategy
          example: 156
        winRate:
          type: number
          format: double
          description: Percentage of profitable trades (0-100)
          example: 58.33
        sharpeRatio:
          type: number
          format: double
          description: Risk-adjusted return ratio (mean return / standard deviation of returns)
          example: 1.245
        sortinoRatio:
          type: number
          format: double
          description: Downside risk-adjusted return ratio (mean return / downside deviation)
          example: 1.872
        cagr:
          type: number
          format: double
          description: Compound Annual Growth Rate
          example: 0.1534
        maxDrawdown:
          type: number
          format: double
          description: Maximum absolute drawdown in the output currency
          example: 12.50
        maxDrawdownPercent:
          type: number
          format: double
          description: Maximum percentage drawdown from peak equity
          example: 8.75
        signalCount:
          type: integer
          description: Number of signals emitted during strategy execution
          example: 100000
        signalsId:
          type: string
          description: >-
            Storage key for the signal Parquet file. Format: {userId}/exec/{exchange}/{jobId}
          example: "4a627755-7f5a-4297-b647-8dddd8aee416/exec/binance/3vsndwikcuaatjmb83fjtl"
        signalsUrl:
          type: string
          format: uri
          description: >-
            Public HTTPS URL to the Parquet file. Computed at setup time from
            publicBaseUrl + signalsId + .parquet. Available even before upload completes.
          example: "https://storage.qtsurfer.com/4a627755-7f5a-4297-b647-8dddd8aee416/exec/binance/3vsndwikcuaatjmb83fjtl.parquet"
        signalsUpload:
          type: string
          enum: [Done, Failed, Skipped]
          description: >-
            Upload status. Done = file uploaded to R2. Failed = upload error (see signalsUploadReason).
            Skipped = no signals emitted or storage not configured.
          example: "Done"
        signalsUploadedAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp of when the upload completed. Only present when signalsUpload is Done.
          example: "2026-03-18T13:21:48.170Z"
        signalsUploadReason:
          type: string
          description: Human-readable reason when signalsUpload is Failed or Skipped.
          example: "parquet file empty or missing after close"
    strategyId:
      description: Unique identifier for a compiled strategy
      type: string
      example: 6bsh31ikwkuivhtgcoa6s4
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        JWT bearer token. The `sub` claim must contain the user identifier
        (e.g. user UUID). This value is used to namespace storage paths
        and trace requests back to the originating user.
tags:
  - name: Exchange
    description: |-
      This set of endpoints allows interaction with various **exchanges** for cryptocurrencies and financial assets. With these endpoints, users can access information about available exchanges, 
      retrieve the instruments (currency pairs or assets) offered by each exchange, and perform analyses on them. The data provided by these endpoints is crucial for strategic decision-making 
      within the trading platform.

      **Key functionalities**:
      - Retrieve the list of available exchanges on the platform.
      - Get the instruments available on a specific exchange (currency pairs, assets, etc.).
  - name: Backtesting
    description: |-
      The **backtest** endpoints enable users to test trading strategies based on historical data before applying them in real-time trading. This functionality is essential for traders who want
      to evaluate the performance of a strategy under past market conditions and optimize it before implementing it in a live trading environment.

      **Key functionalities**:
      - Prepare historical market data for fast access.
      - Run simulations of trading strategies using prepared historical market data.
      - Assess performance and optimize strategies based on past results and metrics.
  - name: Strategy
    description: |-
      The **strategy** endpoints allow users to submit, compile, and validate trading strategies within the platform. This feature is crucial for traders who develop automated trading systems and
      wish to ensure their strategy is both executable and effective before deploying it in a live/backtesting environment.

      **Key functionalities**:
      - Submit rich Java&trade; based trading strategies for validation and compilation.
      - Ensure strategies meet the required syntax and operational constraints.
      - Validate strategies to identify potential issues or errors before execution.
      - Integrate strategies with specific exchanges and market instruments for tailored use.
