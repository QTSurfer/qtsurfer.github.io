name: Generate Redoc HTML

on:
  push:
    paths:
      - "openapi.yaml"
      - ".github/workflows/redoc_index.yml"
      - "redocly.yaml"
    branches:
      - main

jobs:
  generate-redoc:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Redocly CLI
        run: npm install -g @redocly/cli@1.28.4

      - name: Lint OpenAPI spec
        run: redocly lint openapi.yaml

      - name: Generate HTML from OpenAPI
        run: |
          redocly build-docs openapi.yaml --output=index.html
          sed -i 's|https://cdn.redocly.com/redoc/v[^/]*/bundles/redoc.standalone.js|https://cdn.redocly.com/redoc/v2.4.0/bundles/redoc.standalone.js|' index.html

      - name: Commit HTML file
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          file_pattern: index.html
          commit_message: "chore: Updated OpenAPI HTML documentation"
